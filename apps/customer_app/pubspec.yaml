name: customer_app
description: "Marketplace customer app for browsing products, booking services, and managing orders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # Storage
  flutter_secure_storage: ^9.2.4

  # Image Caching
  cached_network_image: ^3.4.1

  # OTP Input
  pin_code_fields: ^8.0.1

  # Date Formatting
  intl: ^0.19.0

  # Shimmer Loading
  shimmer: ^3.0.0

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
